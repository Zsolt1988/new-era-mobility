            const fmt = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
            
            let currentPage = 1;
            const itemsPerPage = 50;

            function initFilters() {
                const makes = [...new Set(cars.map(c => c.name.split(' ')[0]))].sort();
                const mFilter = document.getElementById('makeFilter');
                makes.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.innerText = m;
                    mFilter.appendChild(opt);
                });
                
                ['makeFilter', 'yearMin', 'yearMax', 'kmMin', 'kmMax'].forEach(id => {
                    document.getElementById(id).addEventListener('input', () => { currentPage = 1; render(); });
                });
            }

            function resetFilters() {
                document.getElementById('searchInput').value = '';
                document.getElementById('makeFilter').value = '';
                document.getElementById('yearMin').value = '';
                document.getElementById('yearMax').value = '';
                document.getElementById('kmMin').value = '';
                document.getElementById('kmMax').value = '';
                currentPage = 1;
                render();
            }

            function updateCalc(id, val) {
                const car = cars.find(c => c.id === id);
                if (!car) return;
                const netto = parseFloat(val) || 0;
                const auctionPct = (netto * 1.19) * 0.035;
                const totalNetto = netto + auctionPct + 140 + car.transport + 800;
                const totalBrutto = totalNetto * 1.20;
                
                const elPct = document.getElementById(`auctionPct_${id}`);
                const elNet = document.getElementById(`totalNetto_${id}`);
                const elMain = document.getElementById(`mainPrice_${id}`);
                if(elPct) elPct.innerText = fmt.format(auctionPct + 140);
                if(elNet) elNet.innerText = fmt.format(totalNetto);
                if(elMain) elMain.innerText = fmt.format(totalBrutto);
            }

            function render() {
                const grid = document.getElementById('carGrid');
                const term = document.getElementById('searchInput').value.toLowerCase();
                const makeVal = document.getElementById('makeFilter').value;
                const yMin = parseInt(document.getElementById('yearMin').value) || 0;
                const yMax = parseInt(document.getElementById('yearMax').value) || 9999;
                const kMin = parseInt(document.getElementById('kmMin').value) || 0;
                const kMax = parseInt(document.getElementById('kmMax').value) || 9999999;

                const filtered = cars.filter(c => {
                    const matchSearch = c.name.toLowerCase().includes(term) || c.id.includes(term) || c.ausfuehrung.toLowerCase().includes(term);
                    const matchMake = !makeVal || c.name.startsWith(makeVal);
                    const matchYear = c.year_raw >= yMin && c.year_raw <= yMax;
                    const matchKm = c.km_raw >= kMin && c.km_raw <= kMax;
                    return matchSearch && matchMake && matchYear && matchKm;
                });
                
                const totalPages = Math.ceil(filtered.length / itemsPerPage);
                if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                
                const start = (currentPage - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const pageItems = filtered.slice(start, end);
                
                grid.innerHTML = '';
                pageItems.forEach(car => {
                    let featuresHtml = `<div class="flex flex-wrap gap-1 mb-4 ausstattung-section">`;
                    if (car.ausstattung && car.ausstattung.length > 0) {
                        car.ausstattung.forEach(feat => {
                            featuresHtml += `<span class="text-[9px] ausstattung-badge px-1.5 py-0.5 rounded shadow-sm">${feat}</span>`;
                        });
                        if (car.ausstattung_full.length > 6) featuresHtml += `<span class="text-[9px] ausstattung-badge px-1.5 py-0.5 rounded shadow-sm">... +${car.ausstattung_full.length - 6}</span>`;
                    } else {
                        featuresHtml += `<span class="text-[9px] text-slate-300 italic self-center">Keine Sonderausstattung gelistet</span>`;
                    }
                    featuresHtml += `</div>`;

                    const card = document.createElement('div');
                    card.className = 'glass-card rounded-2xl overflow-hidden p-5 shadow-sm flex flex-col';
                    card.innerHTML = `
                        <div class="h-40 bg-slate-200 rounded-xl overflow-hidden mb-4 relative">
                            <img src="${car.img || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover">
                            <div class="absolute top-2 left-2 bg-white/90 px-2 py-1 rounded text-[10px] font-bold">Kat. ${car.id}</div>
                        </div>
                        <div class="title-section mb-2 overflow-hidden">
                            <h3 class="font-bold text-slate-800 truncate text-sm">${car.name}</h3>
                            <p class="text-[9px] text-slate-500 truncate font-bold uppercase tracking-tight">${car.ausfuehrung || '-'}</p>
                        </div>
                        <div class="specs-section flex gap-1.5 text-[10px] mb-3">
                            <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-bold">${car.ez}</span>
                            <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-bold">${car.km} KM</span>
                            <span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded font-bold">${car.ps} PS</span>
                        </div>
                        ${featuresHtml}
                        <div class="mb-4">
                            <label class="text-[10px] font-bold text-slate-400 uppercase">BCA Netto (€)</label>
                            <input type="number" value="${car.bca_price}" oninput="updateCalc('${car.id}', this.value)" class="price-input w-full px-3 py-2 rounded-lg font-bold text-slate-700">
                        </div>
                        <div class="calc-box p-3 rounded-xl mb-4 text-[11px] space-y-1">
                            <div class="flex justify-between text-slate-500"><span>+ Gebühren</span><span id="auctionPct_${car.id}">${fmt.format((car.details.auction_percent || 0) + 140)}</span></div>
                            <div class="flex justify-between text-slate-500"><span>+ Transport/Imp.</span><span>${fmt.format(car.transport + 800)}</span></div>
                            <div class="flex justify-between font-bold text-slate-700 pt-1 border-t border-slate-200 border-dashed"><span>Summe Netto</span><span id="totalNetto_${car.id}">${fmt.format(car.details.total_netto || 0)}</span></div>
                        </div>
                        <div class="mt-auto pt-3 border-t border-slate-100 flex items-center justify-between">
                            <div><p class="text-[10px] font-bold text-slate-400">Endpreis AT (Brutto)</p><p class="text-xl font-bold text-green-600" id="mainPrice_${car.id}">${fmt.format(car.details.total_brutto_at || 0)}</p></div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                
                renderPagination(totalPages);
            }

            function renderPagination(totalPages) {
                const pag = document.getElementById('pagination');
                pag.innerHTML = '';
                if (totalPages <= 1) return;
                
                const prev = document.createElement('button');
                prev.innerText = 'Zurück';
                prev.className = 'pagination-btn px-4 py-2 rounded-lg text-sm font-bold';
                prev.disabled = currentPage === 1;
                prev.onclick = () => { currentPage--; render(); window.scrollTo(0,0); };
                pag.appendChild(prev);
                
                for(let i=1; i<=totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.innerText = i;
                    btn.className = `pagination-btn w-10 h-10 rounded-lg text-sm font-bold ${i === currentPage ? 'active' : ''}`;
                    btn.onclick = () => { currentPage = i; render(); window.scrollTo(0,0); };
                    pag.appendChild(btn);
                }
                
                const next = document.createElement('button');
                next.innerText = 'Weiter';
                next.className = 'pagination-btn px-4 py-2 rounded-lg text-sm font-bold';
                next.disabled = currentPage === totalPages;
                next.onclick = () => { currentPage++; render(); window.scrollTo(0,0); };
                pag.appendChild(next);
            }

            document.getElementById('searchInput').addEventListener('input', () => { currentPage = 1; render(); });
            initFilters();
            render();
        </script>
    </body>
