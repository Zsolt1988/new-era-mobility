<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-modal {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-200 min-h-screen flex items-center justify-center p-4">

    <!-- Demo Trigger Button (Nur zur Vorschau) -->
    <button onclick="openModal('Tesla Model 3', '12345')" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all transform hover:scale-105">
        Beispiel: Anfrage für Tesla öffnen
    </button>

    <!-- Modal Backdrop -->
    <div id="modalBackdrop" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-opacity duration-300 opacity-0">
        
        <!-- Modal Container -->
        <div id="modalContainer" class="max-w-lg w-full glass-modal rounded-3xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-95 opacity-0">
            
            <!-- Header -->
            <div class="flex items-center justify-between p-6 border-b border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-blue-50 rounded-lg text-blue-600">
                        <i data-lucide="info" class="w-5 h-5"></i>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800">Fahrzeuganfrage</h3>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-slate-100 rounded-full text-slate-400 hover:text-slate-600 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <!-- Content -->
            <div class="p-8">
                <p class="text-lg text-slate-700 leading-relaxed mb-8">
                    Sie interessieren sich für den <span id="modalCarName" class="font-bold text-blue-600">...</span>, 
                    ID: <span id="modalCarId" class="font-mono text-slate-500 bg-slate-100 px-1.5 py-0.5 rounded">...</span>.
                </p>

                <div class="space-y-5">
                    <!-- Option 1 -->
                    <label class="flex items-start gap-4 p-4 rounded-2xl hover:bg-slate-50 cursor-pointer transition-colors border border-transparent hover:border-slate-100 group">
                        <div class="flex items-center h-6">
                            <input type="checkbox" id="checkEmail" class="w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-slate-800 font-semibold group-hover:text-blue-600 transition-colors">Technischer Zustandsbericht</span>
                            <span class="text-sm text-slate-500">Ich möchte den Bericht per E-Mail erhalten.</span>
                        </div>
                    </label>

                    <!-- Option 2 -->
                    <div class="flex items-start gap-4 p-4 rounded-2xl hover:bg-slate-50 transition-colors border border-transparent hover:border-slate-100 group">
                        <div class="flex items-center h-6 pt-1">
                            <input type="checkbox" id="checkLimit" onchange="toggleLimitInput(this.checked)" class="w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                        </div>
                        <div class="flex flex-col w-full">
                            <label for="checkLimit" class="text-slate-800 font-semibold cursor-pointer group-hover:text-blue-600 transition-colors">Gebotslimit prüfen</label>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-sm text-slate-500 whitespace-nowrap">Bitte prüfen Sie mein Limit von</span>
                                <div class="relative inline-block w-32">
                                    <input type="number" id="limitInput" disabled placeholder="0.00" class="w-full pl-3 pr-8 py-1.5 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-50 disabled:bg-slate-50">
                                    <span class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs font-bold">€</span>
                                </div>
                                <span class="text-sm text-slate-500">auf Machbarkeit.</span>
                            </div>
                        </div>
                    </div>

                    <!-- Option 3 -->
                    <label class="flex items-start gap-4 p-4 rounded-2xl hover:bg-slate-50 cursor-pointer transition-colors border border-transparent hover:border-slate-100 group">
                        <div class="flex items-center h-6">
                            <input type="checkbox" id="checkImport" class="w-5 h-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                        </div>
                        <div class="flex flex-col">
                            <span class="text-slate-800 font-semibold group-hover:text-blue-600 transition-colors">Allgemeine Frage</span>
                            <span class="text-sm text-slate-500">Ich habe eine Frage zum Import-Ablauf.</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-6 bg-slate-50/50 flex flex-col sm:flex-row gap-3">
                <button onclick="sendInquiry()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-2xl shadow-xl shadow-blue-200 transition-all flex items-center justify-center gap-2 group">
                    <i data-lucide="send" class="w-5 h-5 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                    Anfrage senden
                </button>
                <button onclick="closeModal()" class="flex-1 bg-white hover:bg-slate-100 text-slate-600 font-bold py-4 px-6 rounded-2xl border border-slate-200 transition-colors">
                    Abbrechen
                </button>
            </div>
        </div>
    </div>

    <script>
        // Icons initialisieren
        lucide.createIcons();

        function openModal(carName, carId) {
            const backdrop = document.getElementById('modalBackdrop');
            const container = document.getElementById('modalContainer');
            
            document.getElementById('modalCarName').innerText = carName;
            document.getElementById('modalCarId').innerText = carId;
            
            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.add('opacity-100');
                container.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const backdrop = document.getElementById('modalBackdrop');
            const container = document.getElementById('modalContainer');
            
            backdrop.classList.remove('opacity-100');
            container.classList.remove('scale-100', 'opacity-100');
            
            setTimeout(() => {
                backdrop.classList.add('hidden');
                // Reset Form
                document.getElementById('checkEmail').checked = false;
                document.getElementById('checkLimit').checked = false;
                document.getElementById('checkImport').checked = false;
                document.getElementById('limitInput').value = '';
                document.getElementById('limitInput').disabled = true;
            }, 300);
        }

        function toggleLimitInput(checked) {
            const input = document.getElementById('limitInput');
            input.disabled = !checked;
            if(checked) input.focus();
        }

        function sendInquiry() {
            const data = {
                car: document.getElementById('modalCarName').innerText,
                id: document.getElementById('modalCarId').innerText,
                wantsTechnicalReport: document.getElementById('checkEmail').checked,
                wantsLimitCheck: document.getElementById('checkLimit').checked,
                limitAmount: document.getElementById('limitInput').value,
                hasGeneralQuestion: document.getElementById('checkImport').checked
            };

            console.log("Anfrage gesendet:", data);
            alert("Anfrage für " + data.car + " wurde in der Konsole ausgegeben!");
            closeModal();
        }
    </script>
</body>
</html>
