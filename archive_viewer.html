<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <title>BCA Archiv Viewer</title>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
        .sold-badge { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; }
        .date-badge { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .filter-select { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px 12px; transition: border-color 0.2s; }
        .filter-select:focus { border-color: #3b82f6; outline: none; }
        .timer-badge { transition: background-color 0.5s ease; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
            <div>
                <h1 class="text-4xl font-bold text-slate-800 mb-2">Verkaufs-Historie</h1>
                <p class="text-slate-500">Diese Fahrzeuge wurden in den letzten 30 Tagen im System erfasst.</p>
            </div>
            <div class="text-right flex flex-wrap items-center justify-end gap-3 w-full md:w-auto">
                <div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                    <label for="maxAgeInput" class="text-xs font-bold text-slate-500">Max Alter (Tage):</label>
                    <input type="number" id="maxAgeInput" value="7" min="0" class="w-12 text-sm font-bold text-slate-800 focus:outline-none text-center">
                </div>
                <button id="genIndexBtn" onclick="generateIndex()" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 transition-colors text-white rounded-full font-bold text-sm shadow-lg flex items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Index.html updaten
                </button>
                <span id="carCount" class="px-4 py-2 bg-blue-600 text-white rounded-full font-bold text-sm shadow-lg">0 Fahrzeuge</span>
            </div>
        </header>

        <!-- Navigation Bar -->
        <div class="mb-6 flex flex-wrap gap-3">
            <a href="bca_merge_tool.html" target="_blank" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 transition-all rounded-xl font-bold text-xs shadow-sm flex items-center gap-2">
                <i data-lucide="git-merge" class="w-4 h-4"></i> BCA Merge
            </a>
            <a href="launcher.html" target="_blank" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 transition-all rounded-xl font-bold text-xs shadow-sm flex items-center gap-2">
                <i data-lucide="bot" class="w-4 h-4"></i> Agent 1
            </a>
            <a href="index.html" target="_blank" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 hover:text-blue-600 hover:border-blue-200 transition-all rounded-xl font-bold text-xs shadow-sm flex items-center gap-2">
                <i data-lucide="layout" class="w-4 h-4"></i> index.html
            </a>
        </div>

        <!-- Filter Bar -->
        <div class="mb-8 space-y-4">
            <div class="flex flex-col md:flex-row gap-4 p-5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                <!-- Search -->
                <div class="flex flex-col sm:flex-row items-center gap-3">
                    <button id="btnScrapePrices" onclick="startPriceScraper()" class="w-full sm:w-auto px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-sm shadow-lg flex items-center justify-center gap-2 transition-all">
                        <i data-lucide="download-cloud" class="w-4 h-4"></i> Preise automatisch auslesen
                    </button>
                    <div class="relative w-full sm:w-64">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="searchInput" placeholder="Archiv durchsuchen..." class="w-full pl-10 pr-4 py-3 border border-slate-200 rounded-xl outline-none bg-white shadow-sm">
                    </div>
                </div>
                
                <!-- Marke -->
                <div class="w-full md:w-40">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Marke</label>
                    <select id="makeFilter" class="filter-select w-full outline-none text-sm">
                        <option value="">Alle Marken</option>
                    </select>
                </div>

                <!-- Baujahr -->
                <div class="w-full md:w-auto">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Baujahr</label>
                    <div class="flex items-center gap-2">
                        <select id="yearMin" class="filter-select w-full md:w-24 outline-none text-sm">
                            <option value="0">von</option>
                        </select>
                        <select id="yearMax" class="filter-select w-full md:w-24 outline-none text-sm">
                            <option value="9999">bis</option>
                        </select>
                    </div>
                </div>

                <!-- Kilometer -->
                <div class="w-full md:w-auto">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Kilometer</label>
                    <div class="flex items-center gap-2">
                        <select id="kmMin" class="filter-select w-full md:w-28 outline-none text-sm">
                            <option value="0">KM von</option>
                            <option value="0">0 KM</option>
                            <option value="10000">10k KM</option>
                            <option value="50000">50k KM</option>
                            <option value="100000">100k KM</option>
                        </select>
                        <select id="kmMax" class="filter-select w-full md:w-28 outline-none text-sm">
                            <option value="9999999">KM bis</option>
                            <option value="10000">10k KM</option>
                            <option value="50000">50k KM</option>
                            <option value="100000">100k KM</option>
                            <option value="200000">200k KM</option>
                            <option value="9999999">Beliebig</option>
                        </select>
                    </div>
                </div>

                <!-- Sortierung -->
                <div class="w-full md:w-40">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Sortierung</label>
                    <select id="sortOrder" class="filter-select w-full outline-none text-sm">
                        <option value="newest">Neueste zuerst</option>
                        <option value="oldest">Älteste zuerst</option>
                        <option value="price-asc">Preis aufst.</option>
                        <option value="price-desc">Preis abst.</option>
                        <option value="km-asc">KM aufst.</option>
                        <option value="id-asc">ID aufst.</option>
                        <option value="id-desc">ID abst.</option>
                    </select>
                </div>

                <!-- Ausstattung -->
                <div class="w-full md:w-48">
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 block mb-1">Ausstattung</label>
                    <select id="featureFilter" class="filter-select w-full outline-none text-sm">
                        <option value="">Alle Merkmale</option>
                    </select>
                </div>

                <!-- Reset -->
                <div class="flex items-end">
                    <button onclick="resetFilters()" class="px-4 py-2.5 text-xs text-blue-500 font-bold hover:bg-blue-50 rounded-lg transition-colors whitespace-nowrap">Filter Reset</button>
                </div>
            </div>
        </div>

        <div id="archiveGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Loading State -->
            <div class="col-span-full py-20 text-center">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
                <p class="text-slate-400 font-bold">Lade Archiv-Daten...</p>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 transition-opacity opacity-0 duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden transform transition-all scale-95 opacity-0 duration-300" id="modalContent">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 flex-shrink-0">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800" id="modalTitle">Fahrzeug Details</h2>
                    <p class="text-sm text-slate-500" id="modalSubtitle">Komplette Rohdaten</p>
                </div>
                <button onclick="closeDetails()" class="p-2 hover:bg-slate-200 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-slate-500"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto flex-grow bg-white">
                <div id="rawDetailsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-4">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <!-- Analysis Modal -->
    <div id="analysisModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] hidden flex items-center justify-center p-4 transition-opacity opacity-0 duration-300">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-2xl flex flex-col overflow-hidden transform transition-all scale-95 opacity-0 duration-300" id="analysisContent">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-amber-50">
                <div>
                    <h2 class="text-2xl font-bold text-amber-800">Preis-Analyse</h2>
                    <p class="text-sm text-amber-600">Vergleich mit ähnlichen Archiv-Fahrzeugen</p>
                </div>
                <button onclick="closeAnalysis()" class="p-2 hover:bg-amber-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6 text-amber-800"></i>
                </button>
            </div>
            <div class="p-8 space-y-6">
                <div id="analysisSummary" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <!-- Dynamic -->
                </div>
                <div class="space-y-3">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Ähnlichste Fahrzeuge im Archiv:</h3>
                    <div id="similarCarsList" class="space-y-2 max-h-64 overflow-y-auto pr-2">
                        <!-- Dynamic -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fmt = new Intl.NumberFormat('de-DE', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });

        let currentCars = [];

        async function loadArchive() {
            try {
                const response = await fetch('/api/archive');
                const cars = await response.json();
                currentCars = cars;
                
                document.getElementById('carCount').innerText = `${cars.length} Fahrzeuge`;
                initFilters();
                render();
            } catch (e) {
                document.getElementById('archiveGrid').innerHTML = `
                    <div class="col-span-full py-20 text-center text-red-500 font-bold">
                        Fehler beim Laden der Daten. Läuft server.py?
                    </div>
                `;
            }
        }

        function initFilters() {
            const makes = [...new Set(currentCars.map(c => c.name.split(' ')[0]))].sort();
            const mFilter = document.getElementById('makeFilter');
            // Keep first option "Alle Marken"
            mFilter.innerHTML = '<option value="">Alle Marken</option>';
            makes.forEach(m => { const opt = document.createElement('option'); opt.value = m; opt.innerText = m; mFilter.appendChild(opt); });

            const years = [...new Set(currentCars.map(c => c.year_raw))].filter(y => y).sort((a,b) => b-a);
            const yMin = document.getElementById('yearMin');
            const yMax = document.getElementById('yearMax');
            yMin.innerHTML = '<option value="0">von</option>';
            yMax.innerHTML = '<option value="9999">bis</option>';
            years.forEach(y => {
                const opt1 = document.createElement('option'); opt1.value = y; opt1.innerText = y; yMin.appendChild(opt1);
                const opt2 = document.createElement('option'); opt2.value = y; opt2.innerText = y; yMax.appendChild(opt2);
            });

            const features = [...new Set(currentCars.flatMap(c => c.ausstattung_full || []))].filter(f => f).sort();
            const fFilter = document.getElementById('featureFilter');
            fFilter.innerHTML = '<option value="">Alle Merkmale</option>';
            features.forEach(f => { const opt = document.createElement('option'); opt.value = f; opt.innerText = f; fFilter.appendChild(opt); });

            // Re-bind listeners (if not already done)
            const inputs = ['searchInput', 'makeFilter', 'yearMin', 'yearMax', 'kmMin', 'kmMax', 'sortOrder', 'featureFilter'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el && !el.dataset.listener) {
                    el.addEventListener('input', render);
                    el.addEventListener('change', render);
                    el.dataset.listener = "true";
                }
            });
        }

        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('makeFilter').value = '';
            document.getElementById('yearMin').value = '0';
            document.getElementById('yearMax').value = '9999';
            document.getElementById('kmMin').value = '0';
            document.getElementById('kmMax').value = '9999999';
            document.getElementById('sortOrder').value = 'newest';
            document.getElementById('featureFilter').value = '';
            render();
        }

        function getAustrianGrossPrice(car, val) {
            const netto = val / 1.19; 
            const fees = (netto * 1.19) * 0.035 + 140;
            const comm = Math.max(500, netto * 0.02);
            const transport = (car.transport || 400) * 1.5;
            const totalBrutto = (netto + fees + transport + 800 + comm) * 1.20;
            return totalBrutto;
        }

        function render() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const make = document.getElementById('makeFilter').value;
            const yMin = parseInt(document.getElementById('yearMin').value) || 0;
            const yMax = parseInt(document.getElementById('yearMax').value) || 9999;
            const kMin = parseInt(document.getElementById('kmMin').value) || 0;
            const kMax = parseInt(document.getElementById('kmMax').value) || 9999999;
            const sort = document.getElementById('sortOrder').value;
            const feature = document.getElementById('featureFilter').value;

            let filtered = currentCars.filter(car => {
                const matchesTerm = car.name.toLowerCase().includes(term) || car.id.toString().includes(term) || (car.ausfuehrung && car.ausfuehrung.toLowerCase().includes(term));
                const matchesMake = !make || car.name.toLowerCase().startsWith(make.toLowerCase());
                const matchesYear = (car.year_raw || 0) >= yMin && (car.year_raw || 0) <= yMax;
                const matchesKm = (car.km_raw || 0) >= kMin && (car.km_raw || 0) <= kMax;
                const matchesFeature = !feature || (car.ausstattung_full && car.ausstattung_full.includes(feature));
                return matchesTerm && matchesMake && matchesYear && matchesKm && matchesFeature;
            });

            // Sorting
            filtered.sort((a, b) => {
                if (sort === 'newest') return new Date(b.archive_date) - new Date(a.archive_date);
                if (sort === 'oldest') return new Date(a.archive_date) - new Date(b.archive_date);
                if (sort === 'price-asc') return (a.details?.total_brutto_at || 0) - (b.details?.total_brutto_at || 0);
                if (sort === 'price-desc') return (b.details?.total_brutto_at || 0) - (a.details?.total_brutto_at || 0);
                if (sort === 'km-asc') return (a.km_raw || 0) - (b.km_raw || 0);
                if (sort === 'id-asc') return parseInt(a.id) - parseInt(b.id);
                if (sort === 'id-desc') return parseInt(b.id) - parseInt(a.id);
                return 0;
            });

            const grid = document.getElementById('archiveGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="col-span-full py-20 text-center text-slate-400 font-bold">Keine Fahrzeuge mit diesen Filtern gefunden.</div>';
                return;
            }

            grid.innerHTML = filtered.map(car => {
                const isSold = car.verkaufspreis && car.verkaufspreis > 0;
                return `
                <div class="glass-card rounded-3xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition-all ${isSold ? 'border-2 border-emerald-500 shadow-emerald-50/50' : ''}">
                    <div class="relative h-48 bg-slate-100">
                        <img src="${car.img || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover opacity-80" alt="${car.name}">
                        <div class="absolute top-3 left-3 date-badge px-3 py-1 rounded-full text-[10px] font-bold shadow-sm">Erfasst: ${car.archive_date}</div>
                        ${car.expiry_date ? `<div class="absolute bottom-3 left-3 bg-slate-900/80 text-white px-3 py-1 rounded-md text-[11px] font-bold shadow-sm flex items-center gap-1 timer-badge" data-expiry="${car.expiry_date}"><i data-lucide="clock" class="w-3 h-3"></i> <span class="timer-text">Lade Timer...</span></div>` : ''}
                        ${car.category === 'Auktionsfahrzeuge' ? `<div class="absolute top-3 right-3 bg-amber-100 text-amber-600 border border-amber-200 px-3 py-1 rounded-full text-[10px] font-bold shadow-sm uppercase tracking-wider flex items-center gap-1"><i data-lucide="gavel" class="w-3 h-3"></i> AUKTION</div>` : `<div class="absolute top-3 right-3 sold-badge px-3 py-1 rounded-full text-[10px] font-bold shadow-sm uppercase tracking-wider">Referenzwert</div>`}
                        
                        ${isSold ? `
                            <div class="absolute inset-0 bg-emerald-600/90 backdrop-blur-sm flex flex-col items-center justify-center text-white z-10 p-4 transition-all">
                                <div class="bg-white/20 p-2 rounded-full mb-1">
                                    <i data-lucide="check-circle" class="w-7 h-7 text-white"></i>
                                </div>
                                <span class="text-[10px] font-black uppercase tracking-wider text-emerald-100 opacity-90">Verkauft</span>
                                <span class="text-lg font-black text-white drop-shadow-md">
                                    ${fmt.format(getAustrianGrossPrice(car, car.verkaufspreis))}
                                </span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="mb-3">
                            <h3 class="text-lg font-bold text-slate-800 leading-tight">
                                #${car.id} - ${car.name}
                                ${car.raw_data?.Ausstattungsvariante && car.raw_data.Ausstattungsvariante !== 'nan' && car.raw_data.Ausstattungsvariante !== '-' ? `<span class="text-slate-800 font-bold ml-1">${car.raw_data.Ausstattungsvariante}</span>` : ''}
                            </h3>
                            <p class="text-xs text-slate-500">${car.ausfuehrung}</p>
                        </div>
                        <div class="flex gap-4 text-[10px] font-bold text-slate-400 uppercase mb-4">
                            <span>${car.ez}</span> &bull; <span>${car.km} KM</span>
                        </div>
                        
                        <div class="mt-auto pt-4 border-t border-slate-100">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Vorab-Kalkulation (Startgebot)</span>
                                    <div class="text-xl font-bold text-slate-700">${fmt.format(car.details.total_brutto_at)}</div>
                                </div>
                                <div class="text-right">
                                    <span class="text-[9px] font-medium text-slate-400 block italic">Inkl. NoVA & Provision</span>
                                </div>
                            </div>
                            
                            <div class="mb-4 pt-4 border-t border-slate-100">
                                <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Tats. Einkaufspreis (Basis Brutto)</label>
                                <div class="flex gap-2 mb-3">
                                    <div class="relative flex-grow">
                                        <input type="number" id="vp-${car.id}" value="${car.verkaufspreis || 0}" 
                                            oninput="updateFinalPriceDisplay('${car.id}')"
                                            class="w-full pl-3 pr-8 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-blue-400 transition-colors">
                                        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">€</span>
                                    </div>
                                    <button onclick="saveVerkaufspreis('${car.id}')" id="save-vp-${car.id}" class="p-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-all shadow-sm flex items-center justify-center min-w-[42px]" title="Preis speichern">
                                        <i data-lucide="save" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                <div class="p-3 bg-blue-50 rounded-2xl border border-blue-100">
                                    <span class="text-[10px] font-bold text-blue-400 uppercase block mb-1">Finaler Kundenpreis (AT)</span>
                                    <div id="finalPrice-${car.id}" class="text-lg font-black text-blue-600">0 €</div>
                                    <span class="text-[9px] text-blue-400 italic">Inkl. NoVA, Transport & Provision</span>
                                </div>
                            </div>

                             <div class="flex flex-wrap gap-2">
                                <button onclick="showDetails('${car.id}')" class="flex-grow py-2 bg-slate-50 hover:bg-blue-50 text-blue-600 font-bold text-sm rounded-xl border border-slate-200 transition-colors flex justify-center items-center gap-2">
                                    <i data-lucide="file-text" class="w-4 h-4"></i> Details
                                </button>
                                <button onclick="analyzePrice('${car.id}')" class="flex-grow py-2 bg-amber-50 hover:bg-amber-100 text-amber-600 font-bold text-sm rounded-xl border border-amber-200 transition-colors flex justify-center items-center gap-2" title="Markt-Analyse basierend auf ähnlichen Fahrzeugen">
                                    <i data-lucide="trending-up" class="w-4 h-4"></i> Analyse
                                </button>
                                <button id="delete-btn-${car.id}" type="button" onclick="event.preventDefault(); event.stopPropagation(); confirmDelete('${car.id}')" class="py-2 px-3 bg-red-50 hover:bg-red-100 text-red-600 rounded-xl border border-red-200 transition-colors flex justify-center items-center min-w-[40px]" title="Löschen">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            // Initialisiere die finale Preisberechnung für alle sichtbaren Karten
            filtered.forEach(car => updateFinalPriceDisplay(car.id));

            lucide.createIcons();
        }

        function showDetails(id) {
            const car = currentCars.find(c => c.id === id);
            if (!car) return;
            
            document.getElementById('modalTitle').innerText = car.name;
            document.getElementById('modalSubtitle').innerText = car.ausfuehrung;
            
            const grid = document.getElementById('rawDetailsGrid');
            if (car.raw_data && Object.keys(car.raw_data).length > 0) {
                grid.innerHTML = Object.entries(car.raw_data).map(([key, value]) => `
                    <div class="border-b border-slate-100 pb-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">${key}</span>
                        <span class="text-sm text-slate-800 font-medium break-words">${value !== 'nan' && value !== 'NaN' ? value : '-'}</span>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `
                    <div class="col-span-full py-10 text-center text-slate-500 bg-slate-50 rounded-2xl">
                        <i data-lucide="info" class="w-8 h-8 mx-auto mb-2 text-slate-400"></i>
                        <p class="font-bold">Keine Rohdaten verfügbar.</p>
                        <p class="text-xs mt-1">Dieses Fahrzeug wurde vor dem Daten-Update archiviert.</p>
                    </div>
                `;
            }
            
            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95', 'opacity-0');
            }, 10);
            lucide.createIcons();
        }

        function closeDetails() {
            const modal = document.getElementById('detailsModal');
            const content = document.getElementById('modalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function analyzePrice(id) {
            const target = currentCars.find(c => c.id === id);
            if (!target) return;
            
            const targetMake = target.name.split(' ')[0].toLowerCase();
            const targetModel = target.name.split(' ').slice(1).join(' ').toLowerCase();
            const targetVariant = target.raw_data?.Ausstattungsvariante?.toLowerCase() || '';
            const targetKm = target.km_raw || 0;
            
            // Finde ähnliche Fahrzeuge
            const similar = currentCars.filter(c => {
                if (c.id === target.id) return false;
                
                const cMake = c.name.split(' ')[0].toLowerCase();
                const cModel = c.name.split(' ').slice(1).join(' ').toLowerCase();
                const cVariant = c.raw_data?.Ausstattungsvariante?.toLowerCase() || '';
                const cKm = c.km_raw || 0;
                
                // Kriterien:
                // 1. Selbe Marke & Modell
                if (cMake !== targetMake || !cModel.includes(targetModel)) return false;
                
                // 2. Variante (wenn vorhanden)
                const variantMatch = targetVariant && cVariant === targetVariant;
                
                // 3. Kilometer-Toleranz (30%)
                const kmDiff = Math.abs(cKm - targetKm);
                const kmMatch = kmDiff <= (targetKm * 0.35) || kmDiff <= 15000;
                
                // Wir nehmen sie in die Liste, wenn die Variante passt ODER wenn die KM sehr ähnlich sind
                return variantMatch || kmMatch;
            });
            
            // Berechne Durchschnittspreise
            const avgBca = similar.length > 0 ? similar.reduce((sum, c) => sum + (c.bca_price || 0), 0) / similar.length : 0;
            const avgFinal = similar.length > 0 ? similar.reduce((sum, c) => {
                const netto = (c.bca_price || 0);
                const fees = (netto * 1.19) * 0.035 + 140;
                const comm = Math.max(500, netto * 0.02);
                const transport = (c.transport || 400) * 1.5;
                return sum + (netto + fees + transport + 800 + comm) * 1.20;
            }, 0) / similar.length : 0;

            const summary = document.getElementById('analysisSummary');
            summary.innerHTML = `
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <span class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Ø Archiv-Auktionspreis</span>
                    <div class="text-2xl font-black text-slate-800">${fmt.format(avgBca)}</div>
                    <span class="text-[10px] text-slate-400">Netto-Basis</span>
                </div>
                <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100">
                    <span class="text-[10px] font-bold text-amber-500 uppercase block mb-1">Ø Erwarteter Kundenpreis (AT)</span>
                    <div class="text-2xl font-black text-amber-600">${fmt.format(avgFinal)}</div>
                    <span class="text-[10px] text-amber-500">Inkl. NoVA & Provision</span>
                </div>
            `;
            
            const list = document.getElementById('similarCarsList');
            if (similar.length === 0) {
                list.innerHTML = '<p class="text-sm text-slate-400 italic text-center py-8">Keine vergleichbaren Fahrzeuge im Archiv gefunden.</p>';
            } else {
                list.innerHTML = similar.sort((a,b) => Math.abs(a.km_raw - targetKm) - Math.abs(b.km_raw - targetKm)).slice(0, 10).map(c => `
                    <div class="flex items-center justify-between p-3 bg-slate-50 hover:bg-white rounded-xl border border-slate-100 transition-colors group">
                        <div class="flex items-center gap-3">
                            <img src="${c.img}" class="w-10 h-10 rounded-lg object-cover">
                            <div>
                                <div class="text-xs font-bold text-slate-800">${c.name}</div>
                                <div class="text-[10px] text-slate-500 font-medium">${c.raw_data?.Ausstattungsvariante || '-'} • ${c.ez} • ${c.km} KM</div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-sm font-bold text-slate-700">${fmt.format(c.bca_price)}</div>
                            <div class="text-[9px] text-slate-400 uppercase font-bold">Auktions-Netto</div>
                        </div>
                    </div>
                `).join('');
            }
            
            const modal = document.getElementById('analysisModal');
            const content = document.getElementById('analysisContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95', 'opacity-0');
            }, 10);
            lucide.createIcons();
        }

        function closeAnalysis() {
            const modal = document.getElementById('analysisModal');
            const content = document.getElementById('analysisContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            const syncBtn = document.getElementById('syncGitHub');
            if(syncBtn) syncBtn.style.display = 'none';
        }

        setInterval(() => {
            document.querySelectorAll('.timer-badge').forEach(badge => {
                const expiry = new Date(badge.getAttribute('data-expiry')).getTime();
                const now = new Date().getTime();
                const distance = expiry - now;

                const textEl = badge.querySelector('.timer-text');
                if (!textEl) return;

                if (distance < 0) {
                    textEl.innerText = "Auktion beendet";
                    badge.classList.remove('bg-slate-900/80');
                    badge.classList.add('bg-red-600/90');
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                let timerStr = "Auktion endet in: ";
                if(days > 0) timerStr += `${days}Tag(e) `;
                if(hours > 0 || days > 0) timerStr += `${hours}Std. `;
                timerStr += `${minutes}Min. ${seconds}s`;
                
                textEl.innerText = timerStr;
            });
        }, 1000);

        async function startPriceScraper() {
            const btn = document.getElementById('btnScrapePrices');
            if(!btn) return;
            const old = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Scraper läuft...';
            lucide.createIcons();
            
            try {
                const res = await fetch('/api/scrape-prices', { method: 'POST' });
                const data = await res.json();
                if (data.status === 'success') {
                    alert('Scraper beendet! ' + (data.count || 0) + ' Preise aktualisiert.');
                    window.location.reload();
                } else {
                    alert('Fehler: ' + data.message);
                }
            } catch (e) {
                alert('Server nicht erreichbar.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = old;
                lucide.createIcons();
            }
        }

        function updateFinalPriceDisplay(id) {
            const car = currentCars.find(c => String(c.id) === String(id));
            if (!car) return;
            const val = parseFloat(document.getElementById(`vp-${id}`).value) || 0;
            
            // Kalkulations-Logik (Analog zu index.html)
            const netto = val / 1.19; 
            const fees = (netto * 1.19) * 0.035 + 140;
            const comm = Math.max(500, netto * 0.02);
            const transport = (car.transport || 400) * 1.5;
            const totalBrutto = (netto + fees + transport + 800 + comm) * 1.20;
            
            const display = document.getElementById(`finalPrice-${id}`);
            if (display) display.innerText = fmt.format(totalBrutto);
        }

        async function saveVerkaufspreis(id) {
            const input = document.getElementById(`vp-${id}`);
            const btn = document.getElementById(`save-vp-${id}`);
            const vp = parseFloat(input.value) || 0;
            
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
            lucide.createIcons();

            try {
                const response = await fetch('/api/archive/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, updates: { verkaufspreis: vp } })
                });
                const data = await response.json();
                if (data.status === 'success') {
                    btn.classList.replace('bg-blue-600', 'bg-emerald-500');
                    btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>';
                    lucide.createIcons();
                    setTimeout(() => {
                        btn.classList.replace('bg-emerald-500', 'bg-blue-600');
                        btn.innerHTML = originalHTML;
                        btn.disabled = false;
                        lucide.createIcons();
                    }, 2000);
                } else {
                    alert('Fehler beim Speichern: ' + data.message);
                    btn.innerHTML = originalHTML;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            } catch (e) {
                console.error(e);
                alert('Netzwerkfehler beim Speichern.');
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        async function generateIndex() {
            const maxAge = document.getElementById('maxAgeInput').value;
            const btn = document.getElementById('genIndexBtn');
            const originalText = btn.innerHTML;
            
            try {
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Generiere...';
                btn.disabled = true;
                lucide.createIcons();
                
                const response = await fetch('/api/generate-index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ maxAge: parseInt(maxAge) || 7 })
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    btn.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i> Erfolgreich (${data.count} Fzg.)`;
                    btn.classList.replace('bg-emerald-500', 'bg-green-600');
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.replace('bg-green-600', 'bg-emerald-500');
                        btn.disabled = false;
                        lucide.createIcons();
                    }, 3000);
                } else {
                    alert('Fehler beim Generieren der Index.html: ' + (data.message || 'Unbekannter Fehler'));
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    lucide.createIcons();
                }
            } catch (error) {
                console.error(error);
                alert('Netzwerkfehler: Konnte /api/generate-index nicht aufrufen.');
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        let deleteTimeouts = {};

        function confirmDelete(id) {
            const btn = document.getElementById(`delete-btn-${id}`);
            if (!btn) return;

            if (btn.classList.contains('confirm-state')) {
                executeDelete(id);
            } else {
                // Change to confirmation state
                btn.classList.add('confirm-state');
                btn.classList.replace('bg-red-50', 'bg-red-600');
                btn.classList.replace('text-red-600', 'text-white');
                btn.innerHTML = '<span class="text-[10px] font-bold">Sicher?</span>';
                
                // Reset after 4 seconds
                if (deleteTimeouts[id]) clearTimeout(deleteTimeouts[id]);
                deleteTimeouts[id] = setTimeout(() => {
                    if (btn) {
                        btn.classList.remove('confirm-state');
                        btn.classList.replace('bg-red-600', 'bg-red-50');
                        btn.classList.replace('text-white', 'text-red-600');
                        btn.innerHTML = '<i data-lucide="trash-2" class="w-4 h-4"></i>';
                        lucide.createIcons();
                    }
                }, 4000);
            }
        }

        async function executeDelete(id) {
            const btn = document.getElementById(`delete-btn-${id}`);
            if (btn) btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
            
            try {
                const response = await fetch('/api/archive/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id })
                });
                
                const data = await response.json();
                if(data.status === 'success') {
                    loadArchive();
                } else {
                    alert('Fehler beim Löschen: ' + (data.message || 'Unbekannt'));
                    loadArchive(); // Reset UI
                }
            } catch(e) {
                alert('Netzwerkfehler beim Löschen.');
                loadArchive(); // Reset UI
            }
        }

        loadArchive();
    </script>
</body>
