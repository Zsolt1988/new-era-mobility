name: Generate BCA Portfolio

on:
  push:
    paths:
      - 'BCAGermanyCheetah_20260425..xls'
      - 'bca_komplett.html'
      - 'create_html_table.py'
  workflow_dispatch: # Erlaubt manuelles Starten auf GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run generation script
        run: |
          python create_html_table.py --xls "BCAGermanyCheetah_20260425..xls" --html "bca_komplett.html" --out "index.html"

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add index.html
          git commit -m "Auto-update portfolio" || echo "No changes to commit"
          git push
